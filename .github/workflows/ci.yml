name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Python syntax check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python files compile
        run: |
          python -m py_compile api/generate-pdf.py
          python -m py_compile api/pdf_generator.py
          python -m py_compile app.py
          echo "All Python files OK"
